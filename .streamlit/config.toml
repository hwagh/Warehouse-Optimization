[theme]
# The app's charts, flow diagram, and cards are designed for a dark canvas,
# so pin a consistent dark theme (with the zone-600 blue as the accent).
base = "dark"
primaryColor = "#4f6ef7"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1a1d29"
textColor = "#e6e8ef"
font = "sans serif"
